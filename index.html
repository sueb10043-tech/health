<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>혈당 및 체중 매니저 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0; padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .main-wrapper {
            max-width: 1200px; margin: 0 auto;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex; flex-direction: column;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); width: 100%; }

        .day-cell {
            min-height: 110px;
            border-bottom: 1px solid #f1f5f9;
            border-right: 1px solid #f1f5f9;
            padding: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
        }
        @media (max-width: 640px) { .day-cell { min-height: 95px; padding: 4px; } }
        .day-cell:hover { background-color: #f1f5f9; }

        .sugar-input {
            width: 80px; padding: 6px;
            border: 1.5px solid #e2e8f0; border-radius: 10px;
            text-align: center; font-weight: 700;
            outline: none; background-color: #f8fafc;
            height: 38px !important;
        }
        .sugar-input:focus { border-color: #0ea5e9; }

        .memo-area {
            width: 100%; border: 1.5px solid #e2e8f0; border-radius: 10px;
            padding: 10px; line-height: 1.5; font-size: 15px;
            outline: none; background-color: #fff;
            resize: none;
        }

        .custom-modal {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white; padding: 24px;
            border-radius: 20px; box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
            z-index: 10000; display: none;
            width: 90%; max-width: 500px;
        }

        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.6);
            display: none; z-index: 9000;
            backdrop-filter: blur(4px);
        }

        .tab-active { color: #0ea5e9; font-weight: 800; border-bottom: 2px solid #0ea5e9; }
        .tab-inactive { color: #94a3b8; }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #0ea5e9;
            border-radius: 50%;
            width: 24px; height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #analysis-result-content h3 { font-weight: 800; font-size: 1.2rem; margin-top: 1.5rem; color: #0369a1; border-left: 5px solid #0ea5e9; padding-left: 10px; }
        #analysis-result-content p { margin-bottom: 1rem; line-height: 1.8; font-size: 1rem; color: #334155; }
    </style>
</head>
<body>

    <div id="app-container" class="main-wrapper">
        <!-- 헤더 -->
        <header id="main-header" class="bg-white sticky top-0 z-20 border-b border-slate-100 shadow-sm">
            <div class="relative flex items-center justify-center p-4 max-w-4xl mx-auto w-full">
                <div class="flex items-center gap-8">
                    <button onclick="changeMonth(-1)" class="p-2 hover:bg-slate-50 rounded-full text-slate-400 font-bold transition">〈</button>
                    <h1 id="view-title" class="font-bold text-lg md:text-xl text-slate-800 min-w-[160px] text-center">연도 월</h1>
                    <button onclick="changeMonth(1)" class="p-2 hover:bg-slate-50 rounded-full text-slate-400 font-bold transition">〉</button>
                </div>
                <div id="sync-status" class="absolute right-6 hidden"><div class="loader"></div></div>
            </div>
        </header>

        <main class="flex-grow p-3 md:p-6 overflow-x-hidden pb-32">
            <!-- 1. 달력 섹션 -->
            <section id="view-calendar" class="view-section">
                <div class="max-w-4xl mx-auto border border-slate-200 rounded-3xl overflow-hidden shadow-sm bg-white">
                    <div class="calendar-grid text-center bg-slate-50 border-b border-slate-100 font-bold text-[11px] md:text-sm py-3 text-slate-500 uppercase tracking-wider">
                        <div class="text-rose-500">Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div class="text-sky-500">Sat</div>
                    </div>
                    <div id="calendar-body" class="calendar-grid"></div>
                </div>
            </section>

            <!-- 2. 입력 섹션 -->
            <section id="view-input" class="view-section hidden max-w-4xl mx-auto">
                <div class="bg-white rounded-3xl border border-slate-200 p-5 md:p-8 shadow-xl">
                    <div class="flex justify-between items-center mb-8 border-b pb-4">
                        <h2 id="input-date-title" class="font-bold text-slate-800 text-xl">기록하기</h2>
                        <div class="flex items-center gap-3">
                            <button onclick="handleSave()" id="save-btn" class="bg-sky-500 hover:bg-sky-600 text-white px-8 py-2.5 rounded-2xl font-bold shadow-lg transition active:scale-95 disabled:opacity-50">저장</button>
                            <button onclick="switchView('calendar')" class="text-slate-300 hover:text-slate-500 text-3xl px-2 font-light">✕</button>
                        </div>
                    </div>
                    <div class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="bg-blue-50/40 p-5 rounded-3xl border border-blue-100">
                                <div class="flex items-center justify-between mb-4">
                                    <span class="font-bold text-blue-800">🌥️ 아침 공복</span>
                                    <input type="number" id="m_val" class="sugar-input" oninput="validateInputColor(this, 100)" placeholder="0">
                                </div>
                                <textarea id="m_memo" class="memo-area h-24" placeholder="아침 메모 (C)"></textarea>
                            </div>
                            <div class="bg-orange-50/40 p-5 rounded-3xl border border-orange-100 flex flex-col justify-center">
                                <div class="flex items-center justify-between">
                                    <span class="font-bold text-orange-800">⚖️ 체중 기록 (I)</span>
                                    <input type="number" step="0.1" id="weight_val" class="sugar-input" placeholder="00.0">
                                </div>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="bg-slate-50/50 p-5 rounded-3xl border border-slate-200">
                                <div class="flex items-center justify-between mb-4">
                                    <span class="font-bold text-slate-700">☀️ 점심 혈당 (D)</span>
                                    <div class="flex gap-2">
                                        <input type="number" id="l_val" class="sugar-input" oninput="validateInputColor(this, 180)">
                                        <button onclick="fetchMealData()" class="bg-white p-2 rounded-xl border border-slate-200 text-sky-500">🍴</button>
                                    </div>
                                </div>
                                <textarea id="l_memo" class="memo-area h-40" placeholder="점심 식단 (E)"></textarea>
                            </div>
                            <div class="bg-slate-50/50 p-5 rounded-3xl border border-slate-200">
                                <div class="flex items-center justify-between mb-4">
                                    <span class="font-bold text-slate-700">🌙 저녁 혈당 (F)</span>
                                    <input type="number" id="d_val" class="sugar-input" oninput="validateInputColor(this, 180)">
                                </div>
                                <textarea id="d_memo" class="memo-area h-40" placeholder="저녁 식단 (G)"></textarea>
                            </div>
                        </div>
                        <div class="bg-slate-800 p-5 rounded-3xl">
                            <label class="block text-xs font-bold text-slate-400 mb-3 uppercase tracking-widest">General Daily Note (H)</label>
                            <textarea id="memo_val" class="memo-area h-28 border-none bg-slate-700 text-white placeholder-slate-500"></textarea>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 3. 차트 섹션 -->
            <section id="view-chart" class="view-section hidden max-w-4xl mx-auto">
                <div class="bg-white rounded-3xl border border-slate-200 p-6 text-center shadow-sm">
                    <h2 class="font-bold text-slate-800 mb-6 text-lg">데이터 추이</h2>
                    <div id="mainChartContainer" class="w-full h-[400px] relative"><canvas id="mainChart"></canvas></div>
                    <div class="flex justify-center gap-4 mt-8">
                        <button onclick="setChartType('sugar')" class="px-8 py-3 rounded-2xl bg-sky-500 text-white font-bold transition">🩸 혈당</button>
                        <button onclick="setChartType('weight')" class="px-8 py-3 rounded-2xl bg-slate-100 text-slate-500 font-bold transition">⚖️ 체중</button>
                    </div>
                </div>
            </section>

            <!-- 4. 분석 섹션 -->
            <section id="view-analysis" class="view-section hidden max-w-4xl mx-auto text-center">
                <div class="bg-white rounded-[2.5rem] border border-slate-200 p-6 md:p-10 shadow-sm">
                    <h2 class="text-2xl font-black text-slate-800 mb-6">🧠 AI 스마트 분석</h2>
                    <div class="bg-slate-50 rounded-3xl p-5 mb-8 border border-slate-200 text-left">
                        <textarea id="ai-question-input" class="w-full bg-white border border-slate-200 rounded-2xl p-4 text-sm focus:border-sky-400 outline-none mb-4 shadow-sm" rows="3" placeholder="기록된 데이터를 바탕으로 질문하세요."></textarea>
                        <div class="flex gap-3">
                            <button onclick="runAIAnalysis('general')" id="analysis-btn" class="flex-1 bg-sky-500 text-white py-4 rounded-2xl font-bold shadow-lg transition active:scale-95 disabled:bg-slate-300">📊 전체 리포트</button>
                            <button onclick="runAIAnalysis('question')" id="ask-btn" class="flex-1 bg-slate-800 text-white py-4 rounded-2xl font-bold transition active:scale-95 disabled:bg-slate-300 shadow-md">💬 질문하기</button>
                        </div>
                    </div>
                    <div id="analysis-loading" class="hidden py-16"><div class="loader mb-4"></div><p class="text-sky-600 font-black animate-pulse">데이터 정밀 분석 중...</p></div>
                    <div id="analysis-result-container" class="hidden text-left bg-white border border-slate-100 rounded-3xl p-8 shadow-inner">
                        <div id="analysis-result-content" class="whitespace-pre-wrap"></div>
                    </div>
                </div>
            </section>

            <!-- 5. 설정 섹션 -->
            <section id="view-settings" class="view-section hidden max-w-4xl mx-auto">
                <div class="bg-white rounded-3xl border border-slate-200 p-8 shadow-sm">
                    <h2 class="text-xl font-bold text-slate-800 mb-8 flex items-center gap-2">⚙️ 앱 설정</h2>
                    <div id="current-school-info" class="p-5 bg-sky-50 text-sky-700 rounded-2xl font-bold mb-6 italic text-center">
                        <span id="school-name-display">확인 중...</span>
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="school-search-input" class="flex-grow border border-slate-200 rounded-2xl px-5 py-3.5 bg-slate-50 shadow-inner" placeholder="학교명 검색">
                        <button onclick="searchSchool()" class="bg-slate-800 text-white px-8 rounded-2xl font-bold shadow-md">검색</button>
                    </div>
                    <div id="school-search-results" class="max-h-60 overflow-y-auto mt-4 space-y-2"></div>
                </div>
            </section>
        </main>

        <!-- 하단 네비게이션 -->
        <nav id="bottom-nav" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md bg-white/90 backdrop-blur-xl border border-slate-200 flex justify-around py-4 rounded-[2.5rem] shadow-2xl z-50 transition-all duration-300">
            <button onclick="switchView('calendar')" id="nav-calendar" class="flex flex-col items-center gap-1 tab-active flex-1 transition-all"><span class="text-2xl">📅</span><span class="text-[11px] font-bold">달력</span></button>
            <button onclick="switchView('chart')" id="nav-chart" class="flex flex-col items-center gap-1 tab-inactive flex-1 transition-all"><span class="text-2xl">📈</span><span class="text-[11px] font-bold">차트</span></button>
            <button onclick="switchView('analysis')" id="nav-analysis" class="flex flex-col items-center gap-1 tab-inactive flex-1 transition-all"><span class="text-2xl">💡</span><span class="text-[11px] font-bold">분석</span></button>
            <button onclick="switchView('settings')" id="nav-settings" class="flex flex-col items-center gap-1 tab-inactive flex-1 transition-all"><span class="text-2xl">⚙️</span><span class="text-[11px] font-bold">설정</span></button>
        </nav>
    </div>

    <!-- 모달 UI -->
    <div id="overlay" class="overlay" onclick="closeModal()"></div>
    <div id="message-box" class="custom-modal">
        <div id="message-text" class="text-slate-700 font-bold mb-8 leading-relaxed text-left max-h-[350px] overflow-y-auto whitespace-pre-wrap text-sm"></div>
        <button onclick="closeModal()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold shadow-lg transition active:scale-95">확인</button>
    </div>

    <script>
        // 사용자님이 제공하신 새로운 웹앱 주소입니다.
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzzy5rTRkMCM_yGobsETJqY8oH3GQsAgs6IQQgomm0-vLe6AbaeIMOWBklm65B0TUwa/exec";

        let currentMonth = new Date();
        let records = {};
        let schoolInfo = null;
        let selectedDateStr = null;
        let isSyncing = false;
        let chartInstance = null;
        let currentChartType = 'sugar';
        const weekArr = ['일', '월', '화', '수', '목', '금', '토'];

        window.onload = async () => {
            loadLocalData();
            renderCalendar();
            await syncWithCloud();
        };

        function loadLocalData() {
            try {
                records = JSON.parse(localStorage.getItem('health_records_v6')) || {};
                schoolInfo = JSON.parse(localStorage.getItem('health_school_v6'));
            } catch(e) { records = {}; }
        }

        async function syncWithCloud() {
            if (!SCRIPT_URL || isSyncing) return;
            isSyncing = true;
            document.getElementById('sync-status').classList.remove('hidden');
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                if (data.records) {
                    records = data.records;
                    localStorage.setItem('health_records_v6', JSON.stringify(records));
                }
                if (data.schoolInfo) {
                    schoolInfo = data.schoolInfo;
                    localStorage.setItem('health_school_v6', JSON.stringify(schoolInfo));
                }
                renderCalendar();
                displayCurrentSchool();
            } catch (e) { console.error("Sync Error:", e); } finally {
                isSyncing = false;
                document.getElementById('sync-status').classList.add('hidden');
            }
        }

        async function handleSave() {
            if (!selectedDateStr) return;
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            const record = {
                date: selectedDateStr,
                m_val: document.getElementById('m_val').value, m_memo: document.getElementById('m_memo').value,
                l_val: document.getElementById('l_val').value, l_memo: document.getElementById('l_memo').value,
                d_val: document.getElementById('d_val').value, d_memo: document.getElementById('d_memo').value,
                memo: document.getElementById('memo_val').value, weight: document.getElementById('weight_val').value
            };
            records[selectedDateStr] = record;
            localStorage.setItem('health_records_v6', JSON.stringify(records));
            try {
                await fetch(SCRIPT_URL, { 
                    method: "POST", 
                    mode: "no-cors", 
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(record) 
                });
                setTimeout(async () => { await syncWithCloud(); switchView('calendar'); btn.disabled = false; }, 500);
            } catch (e) { btn.disabled = false; }
        }

        async function runAIAnalysis(mode) {
            const btnA = document.getElementById('analysis-btn');
            const btnB = document.getElementById('ask-btn');
            const loading = document.getElementById('analysis-loading');
            const container = document.getElementById('analysis-result-container');
            const content = document.getElementById('analysis-result-content');
            const questionInput = document.getElementById('ai-question-input');

            if (Object.keys(records).length === 0) { showMessageBox("기록된 데이터가 없습니다."); return; }
            btnA.disabled = btnB.disabled = true;
            loading.classList.remove('hidden');
            container.classList.add('hidden');

            const sortedData = Object.entries(records).sort((a, b) => a[0].localeCompare(b[0]))
                .map(([d, r]) => `날짜:${d}, 혈당:${r.m_val||'X'}/${r.l_val||'X'}/${r.d_val||'X'}, 체중:${r.weight||'X'}kg, 식단:${r.l_memo||'X'}/${r.d_memo||'X'}`).join('\n');

            const systemInstruction = "당신은 전문 영양사입니다. 다음 데이터를 정밀 분석하여 건강 가이드를 한국어로 친절하고 전문적으로 제공하세요.";
            const userRequest = mode === 'question' ? `사용자 질문: "${questionInput.value}"` : "전체적인 건강 상태를 요약한 종합 리포트를 작성해줘.";

            try {
                // Code.gs v1.6의 자동 모델 매칭 로직을 활용하기 위해 prompt 필드로 통합하여 전송
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        type: "analyze",
                        prompt: `지침: ${systemInstruction}\n\n데이터:\n${sortedData}\n\n요청사항: ${userRequest}`
                    })
                });
                const result = await response.json();
                
                if (result.error) {
                    const errorDetail = result.detail ? `\n\n상세 정보: ${result.detail}` : "";
                    throw new Error(result.error + errorDetail);
                }

                const aiText = result?.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!aiText) throw new Error("AI 응답을 가져오지 못했습니다.");

                content.innerHTML = aiText
                    .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\n\n/g, '</p><p>')
                    .replace(/\n/g, '<br>');
                
                loading.classList.add('hidden');
                container.classList.remove('hidden');
            } catch (e) {
                showMessageBox(`[분석 실패]\n\n${e.message}\n\n※ 서버 설정이나 API 키의 모델 접근 권한을 다시 한번 확인해 주세요.`);
                loading.classList.add('hidden');
            } finally { btnA.disabled = btnB.disabled = false; }
        }

        function renderCalendar() {
            const body = document.getElementById('calendar-body');
            if(!body) return;
            body.innerHTML = '';
            const yr = currentMonth.getFullYear();
            const mo = currentMonth.getMonth();
            document.getElementById('view-title').innerText = `${yr}년 ${mo + 1}월`;
            const firstDay = new Date(yr, mo, 1).getDay();
            const lastDate = new Date(yr, mo + 1, 0).getDate();
            for (let i = 0; i < firstDay; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'day-cell bg-slate-50/50';
                body.appendChild(emptyCell);
            }
            for (let d = 1; d <= lastDate; d++) {
                const dateKey = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                if (new Date().toISOString().split('T')[0] === dateKey) cell.classList.add('ring-2', 'ring-sky-400', 'bg-sky-50/20');
                const r = records[dateKey];
                let content = `<div><span class="text-[11px] md:text-sm font-bold text-slate-800">${d}</span></div>`;
                if (r) {
                    const check = (v, t) => parseInt(v) <= t ? 'text-sky-500' : 'text-rose-500';
                    content += '<div class="text-[9px] md:text-[11px] font-bold mt-1.5 flex flex-col gap-0.5">';
                    if (r.m_val) content += `<div>🌥️ <span class="${check(r.m_val, 100)}">${r.m_val}</span></div>`;
                    if (r.l_val) content += `<div>☀️ <span class="${check(r.l_val, 180)}">${r.l_val}</span></div>`;
                    if (r.d_val) content += `<div>🌙 <span class="${check(r.d_val, 180)}">${r.d_val}</span></div>`;
                    if (r.weight) content += `<div class="mt-1 border-t pt-0.5 text-slate-400 font-normal">⚖️ ${r.weight}</div>`;
                    content += '</div>';
                }
                cell.innerHTML = content;
                cell.onclick = () => openInput(dateKey);
                body.appendChild(cell);
            }
        }

        function openInput(dateKey) {
            selectedDateStr = dateKey;
            const r = records[dateKey] || {};
            document.getElementById('input-date-title').innerText = `${dateKey.split('-')[1]}월 ${dateKey.split('-')[2]}일 기록`;
            document.getElementById('m_val').value = r.m_val||''; document.getElementById('weight_val').value = r.weight||'';
            document.getElementById('l_val').value = r.l_val||''; document.getElementById('d_val').value = r.d_val||'';
            document.getElementById('m_memo').value = r.m_memo||''; document.getElementById('l_memo').value = r.l_memo||'';
            document.getElementById('d_memo').value = r.d_memo||''; document.getElementById('memo_val').value = r.memo||'';
            validateInputColor(document.getElementById('m_val'), 100);
            validateInputColor(document.getElementById('l_val'), 180);
            validateInputColor(document.getElementById('d_val'), 180);
            switchView('input');
        }

        function switchView(name) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`view-${name}`).classList.remove('hidden');
            const header = document.getElementById('main-header'); const nav = document.getElementById('bottom-nav');
            if (name === 'input') { header.style.display = 'none'; nav.style.display = 'none'; }
            else { header.style.display = 'block'; nav.style.display = 'flex'; }
            if (name === 'calendar') renderCalendar(); else if (name === 'chart') setTimeout(updateChart, 50);
            window.scrollTo(0,0);
        }

        function validateInputColor(el, t) { if (!el) return; const val = parseInt(el.value); el.style.color = !el.value ? '' : (val <= t ? '#0ea5e9' : '#f43f5e'); }
        function changeMonth(s) { currentMonth.setMonth(currentMonth.getMonth() + s); renderCalendar(); }
        function showMessageBox(t) { document.getElementById('message-text').innerText = t; document.getElementById('overlay').style.display = 'block'; document.getElementById('message-box').style.display = 'block'; }
        function closeModal() { document.getElementById('overlay').style.display = 'none'; document.getElementById('message-box').style.display = 'none'; }

        async function searchSchool() {
            const q = document.getElementById('school-search-input').value; if(!q) return;
            try {
                const res = await fetch(`https://open.neis.go.kr/hub/schoolInfo?Type=json&SCHUL_NM=${encodeURIComponent(q)}`);
                const data = await res.json();
                if(data.schoolInfo) {
                    document.getElementById('school-search-results').innerHTML = data.schoolInfo[1].row.map(s => `<div onclick="selectSchool('${s.ATPT_OFCDC_SC_CODE}','${s.SD_SCHUL_CODE}','${s.SCHUL_NM}')" class="p-4 border-b hover:bg-sky-100 cursor-pointer text-sm font-bold transition rounded-xl">${s.SCHUL_NM}</div>`).join('');
                }
            } catch(e) { showMessageBox("학교 검색 실패"); }
        }

        async function selectSchool(atpt, schul, name) {
            schoolInfo = { ATPT_OFCDC_SC_CODE: atpt, SD_SCHUL_CODE: schul, SCHUL_NM: name };
            localStorage.setItem('health_school_v6', JSON.stringify(schoolInfo));
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ type: "settings", schoolInfo }) });
            displayCurrentSchool(); document.getElementById('school-search-results').innerHTML = ''; showMessageBox(`${name} 연동 성공`);
        }

        function displayCurrentSchool() { document.getElementById('school-name-display').innerText = schoolInfo ? `✅ 연동: ${schoolInfo.SCHUL_NM}` : "❌ 학교 미설정"; }

        async function fetchMealData() {
            if(!schoolInfo || !selectedDateStr) return;
            try {
                const res = await fetch(`https://open.neis.go.kr/hub/mealServiceDietInfo?Type=json&ATPT_OFCDC_SC_CODE=${schoolInfo.ATPT_OFCDC_SC_CODE}&SD_SCHUL_CODE=${schoolInfo.SD_SCHUL_CODE}&MLSV_YMD=${selectedDateStr.replace(/-/g,'')}`);
                const data = await res.json();
                if(data.mealServiceDietInfo) {
                    const row = data.mealServiceDietInfo[1].row.find(r => r.MMEAL_SC_NM.includes('중식'));
                    if(row) document.getElementById('l_memo').value += (document.getElementById('l_memo').value ? '\n' : '') + row.DDISH_NM.replace(/<br\/>/g, '\n').replace(/\([^)]*\)/g, '').trim();
                }
            } catch(e) { console.error(e); }
        }

        function updateChart() {
            const canvas = document.getElementById('mainChart'); if(!canvas) return;
            const ctx = canvas.getContext('2d'); const yr = currentMonth.getFullYear(); const mo = currentMonth.getMonth();
            const daysCount = new Date(yr, mo + 1, 0).getDate(); const labels = Array.from({ length: daysCount }, (_, i) => i + 1);
            const datasets = [];
            if (currentChartType === 'sugar') {
                datasets.push({ label: '점심 혈당', data: labels.map(i => records[`${yr}-${String(mo+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`]?.l_val || null), borderColor: '#0ea5e9', fill: true, tension: 0.3, spanGaps: true });
            } else {
                datasets.push({ label: '체중(kg)', data: labels.map(i => records[`${yr}-${String(mo+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`]?.weight || null), borderColor: '#f59e0b', fill: true, tension: 0.3, spanGaps: true });
            }
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, { type: 'line', data: { labels, datasets }, options: { responsive: true, maintainAspectRatio: false } });
        }
        function setChartType(t) { currentChartType = t; updateChart(); }
    </script>
</body>
</html>
