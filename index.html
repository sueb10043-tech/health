<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>혈당 및 체중 매니저 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; text-align: center !important; padding: 0 !important; }

        .main-wrapper { max-width: 1200px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); width: 100%; table-layout: fixed; }
        .day-cell { min-height: 125px; height: 125px; border-bottom: 1px solid #f1f5f9; border-right: 1px solid #f1f5f9; padding: 6px; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; position: relative; overflow: hidden; min-width: 0; }
        
        .today-border { 
            outline: 2.5px solid #0ea5e9 !important; 
            outline-offset: -2.5px; 
            border-radius: 4px; 
            z-index: 10; 
        }

        @media (max-width: 640px) { 
            .day-cell { min-height: 90px; height: 90px; padding: 4px !important; } 
            .mobile-date-header { height: 18px !important; margin-bottom: 2px !important; }
        }
        .day-cell:hover { background-color: #f8fafc; }
        .sugar-input { width: 80px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-weight: 700; font-size: 17px; outline: none; height: 38px !important; }
        .memo-area { width: 100%; border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 10px; line-height: 1.6; font-size: 15px; outline: none; background-color: #fff; resize: none; }
        
        .tab-active { color: #0ea5e9; font-weight: 800; position: relative; }
        .tab-active::after { content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); width: 24px; height: 3px; background-color: #0ea5e9; border-radius: 2px; }
        .tab-inactive { color: #94a3b8; }
        
        .chat-bubble { max-width: 90%; padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.5; margin-bottom: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); word-break: break-all; }
        .chat-user { background-color: #0ea5e9; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .chat-ai { background-color: #f1f5f9; color: #1e293b; align-self: flex-start; border-bottom-left-radius: 4px; white-space: pre-wrap; }

        .loader-sm { border: 2px solid #e0f2fe; border-top: 2px solid #0ea5e9; border-radius: 50%; width: 10px; height: 10px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; display: none; align-items: center; gap: 4px; transition: all 0.3s; white-space: nowrap; }
        #status-badge.syncing { background-color: #e0f2fe; color: #0369a1; display: flex; }
        #status-badge.ok { background-color: #f0fdf4; color: #15803d; display: flex; }
        #status-badge.error { background-color: #fee2e2; color: #b91c1c; display: flex; }
    </style>
</head>
<body>
    <div id="app-container" class="main-wrapper">
        <header id="main-header" class="bg-white sticky top-0 z-20 border-b border-slate-100 shadow-sm h-[64px]">
            <div class="relative flex items-center justify-center h-full max-w-4xl mx-auto w-full px-4">
                <div class="flex items-center gap-6">
                    <button onclick="changeMonth(-1)" class="p-2 text-slate-400 font-bold hover:bg-slate-50 rounded-full transition">〈</button>
                    <h1 id="view-title" class="font-bold text-lg text-slate-800 text-center min-w-[140px]">연도 월</h1>
                    <button onclick="changeMonth(1)" class="p-2 text-slate-400 font-bold hover:bg-slate-50 rounded-full transition">〉</button>
                </div>
                <div id="status-badge" class="absolute right-4"></div>
            </div>
        </header>

        <main class="flex-grow p-3 md:p-6 overflow-x-hidden pb-24">
            <section id="view-calendar" class="view-section">
                <div id="calendar-body" class="border border-slate-200 rounded-3xl overflow-hidden shadow-sm bg-white"></div>
            </section>

            <section id="view-input" class="view-section hidden max-w-4xl mx-auto">
                <div class="bg-white rounded-3xl border border-slate-200 p-4 md:p-6 shadow-xl mb-10">
                    <div class="flex justify-between items-center mb-6 border-b pb-3">
                        <h2 id="input-date-title" class="font-bold text-slate-800 text-xl tracking-tight"></h2>
                        <button onclick="handleCloseInput()" class="text-slate-300 text-3xl font-light hover:text-slate-500 transition-colors">✕</button>
                    </div>
                    <div class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="bg-slate-50/50 p-4 rounded-2xl border border-slate-200">
                                <div class="flex items-center justify-between mb-3"><span class="font-bold text-slate-700 text-sm">🌥️ 아침 공복</span><input type="number" id="morning_sugar" class="sugar-input" oninput="validateInputColor(this, 100); scheduleAutoSave();" placeholder="0"></div>
                                <textarea id="morning_memo" class="memo-area h-[44px] pt-2" placeholder="아침 식단/메모" oninput="scheduleAutoSave()"></textarea>
                            </div>
                            <div class="bg-orange-50/40 p-4 rounded-2xl border border-orange-100">
                                <div class="flex items-center justify-between mb-3">
                                    <div class="flex items-center gap-2"><span class="font-bold text-orange-800 text-sm">⚖️ 체중</span><input type="number" step="0.1" id="body_weight" class="sugar-input !w-[75px]" placeholder="0.0" oninput="scheduleAutoSave()"></div>
                                    <div class="flex items-center gap-2"><span class="font-bold text-orange-800 text-sm">✨ 성공</span><input type="checkbox" id="is_success" class="w-6 h-6 accent-sky-400" onchange="scheduleAutoSave()"></div>
                                </div>
                                <div class="flex items-center border-t border-orange-200/30 pt-3"><span class="font-bold text-orange-800 text-sm">👟 걸음수</span><div class="ml-auto flex items-center gap-2"><input type="number" id="step_count" class="sugar-input !w-[90px]" placeholder="0" oninput="scheduleAutoSave()"></div></div>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="bg-slate-50/50 p-4 rounded-2xl border border-slate-200">
                                <div class="flex items-center justify-between mb-3">
                                    <span class="font-bold text-slate-700 text-sm">☀️ 점심 식후</span>
                                    <div class="flex items-center gap-2">
                                        <button onclick="fetchMeal()" class="w-10 h-10 bg-white border-2 border-sky-100 rounded-xl shadow-sm flex items-center justify-center text-lg">🍴</button>
                                        <input type="number" id="lunch_sugar" class="sugar-input" oninput="validateInputColor(this, 180); scheduleAutoSave();" placeholder="0">
                                    </div>
                                </div>
                                <textarea id="lunch_memo" class="memo-area h-32" placeholder="점심 식단" oninput="scheduleAutoSave()"></textarea>
                            </div>
                            <div class="bg-slate-50/50 p-4 rounded-2xl border border-slate-200">
                                <div class="flex items-center justify-between mb-3"><span class="font-bold text-slate-700 text-sm">🌙 저녁 식후</span><input type="number" id="dinner_sugar" class="sugar-input" oninput="validateInputColor(this, 180); scheduleAutoSave();" placeholder="0"></div>
                                <textarea id="dinner_memo" class="memo-area h-32" placeholder="저녁 식단" oninput="scheduleAutoSave()"></textarea>
                            </div>
                        </div>
                        <div class="bg-slate-50/50 p-4 rounded-2xl border border-slate-200 pb-3"><label class="block text-xs font-bold text-slate-500 mb-1.5 ml-1">📝 기타 메모</label><textarea id="extra_memo" class="memo-area h-[60px]" placeholder="특이사항 기록" oninput="scheduleAutoSave()"></textarea></div>
                    </div>
                </div>
            </section>

            <section id="view-chart" class="view-section hidden max-w-4xl mx-auto">
                <div class="bg-white rounded-3xl border border-slate-200 p-4 md:p-6 shadow-sm">
                    <div class="flex gap-2 mb-6">
                        <button onclick="setChartType('sugar')" id="btn-chart-sugar" class="px-4 py-2 rounded-xl bg-sky-500 text-white text-xs font-bold shadow-md transition-all">혈당 추이</button>
                        <button onclick="setChartType('weight')" id="btn-chart-weight" class="px-4 py-2 rounded-xl bg-slate-100 text-slate-500 text-xs font-bold transition-all">체중 변화</button>
                    </div>
                    <div id="chart-legend-container" class="flex gap-3 text-[11px] font-bold text-slate-500 mb-4"></div>
                    <div class="w-full h-[400px] relative"><canvas id="mainChart"></canvas></div>
                </div>
            </section>

            <section id="view-analysis" class="view-section hidden max-w-4xl mx-auto flex flex-col h-[75vh]">
                <div class="flex-grow bg-slate-50 rounded-3xl p-4 overflow-y-auto flex flex-col gap-2 mb-4 border border-slate-200 shadow-inner" id="chat-container"></div>
                <div class="flex items-stretch gap-2">
                    <textarea id="ai-input" class="flex-grow border-2 border-slate-200 rounded-2xl p-3 focus:border-sky-400 outline-none resize-none h-[56px] shadow-sm text-sm" placeholder="기록에 대해 물어보세요..." spellcheck="false"></textarea>
                    <button onclick="askAI()" id="send-ai-btn" class="w-14 h-[56px] bg-sky-500 text-white rounded-2xl shadow-lg flex items-center justify-center font-bold hover:bg-sky-600 active:scale-95 transition-all">↑</button>
                </div>
            </section>
        </main>

        <nav id="bottom-nav" class="fixed bottom-3 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white/95 border border-slate-200 flex justify-around py-2 rounded-[2.5rem] shadow-2xl z-50">
            <button onclick="switchView('calendar')" id="nav-calendar" class="flex flex-col items-center gap-0.5 tab-active flex-1"><span class="text-xl">📅</span><span class="text-[10px] font-bold">달력</span></button>
            <button onclick="switchView('chart')" id="nav-chart" class="flex flex-col items-center gap-0.5 tab-inactive flex-1"><span class="text-xl">📈</span><span class="text-[10px] font-bold">차트</span></button>
            <button onclick="switchView('analysis')" id="nav-analysis" class="flex flex-col items-center gap-0.5 tab-inactive flex-1"><span class="text-xl">💡</span><span class="text-[10px] font-bold">분석</span></button>
        </nav>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz1WEEFWOaGYo792Q0IkqtfOHZxJ74i205zGpEq534lIvXbfOzyfzztrnmPwyEIkaI7/exec"; 
        let currentMonth = new Date(), records = {}, selectedDateStr = null, isSyncing = false, chartInstance = null, activeView = 'calendar', schoolInfo = null, currentChartType = 'sugar';

        Chart.register(ChartDataLabels);

        window.onload = () => { 
            const local = localStorage.getItem('health_records_v6');
            if(local) { records = JSON.parse(local); renderCalendar(); }
            if (isValidUrl()) setTimeout(syncWithCloud, 500);
            
            const input = document.getElementById('ai-input');
            input.addEventListener('focus', () => setTimeout(scrollToBottom, 300));
        };

        function isValidUrl() { return SCRIPT_URL && SCRIPT_URL.includes("macros/s/"); }

        function scrollToBottom() {
            const container = document.getElementById('chat-container');
            if(container) container.scrollTop = container.scrollHeight;
        }

        let saveTimer = null;

        function updateStatus(type, msg) {
            const badge = document.getElementById('status-badge');
            if (!badge) return;
            badge.className = type;
            badge.innerHTML = (type === 'syncing' ? '<span class="loader-sm"></span>' : (type === 'ok' ? '✓' : '!')) + ` ${msg}`;
            if (type === 'ok' || type === 'error') setTimeout(() => { badge.className = ''; badge.style.display = 'none'; }, 2500);
        }

        function scheduleAutoSave() {
            if (!selectedDateStr) return;
            clearTimeout(saveTimer);
            saveTimer = setTimeout(async () => {
                const getValue = id => { const el = document.getElementById(id); return el ? (el.type === 'checkbox' ? el.checked : el.value) : ''; };
                const record = { date: selectedDateStr, morning_sugar: getValue('morning_sugar'), morning_memo: getValue('morning_memo'), lunch_sugar: getValue('lunch_sugar'), lunch_memo: getValue('lunch_memo'), dinner_sugar: getValue('dinner_sugar'), dinner_memo: getValue('dinner_memo'), extra_memo: getValue('extra_memo'), body_weight: getValue('body_weight'), step_count: getValue('step_count'), is_success: getValue('is_success') };
                records[selectedDateStr] = record;
                localStorage.setItem('health_records_v6', JSON.stringify(records));
                renderCalendar();
                try { await fetch(SCRIPT_URL, { method: "POST", headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(record) }); updateStatus('ok', '저장됨'); } catch (e) { updateStatus('error', '저장 실패'); }
            }, 300);
        }

        async function syncWithCloud() {
            if (isSyncing) return; 
            isSyncing = true; 
            updateStatus('syncing', '데이터 로딩...');
            try { 
                const res = await fetch(SCRIPT_URL + "?t=" + Date.now(), { cache: 'no-store' }); 
                const data = await res.json(); 
                if (data && data.records) { 
                    records = data.records; 
                    schoolInfo = data.schoolInfo; 
                    localStorage.setItem('health_records_v6', JSON.stringify(records)); 
                    renderCalendar(); 
                    updateStatus('ok', '연동 성공'); 
                }
            } catch (e) { updateStatus('error', '연동 실패'); } finally { isSyncing = false; }
        }

        async function askAI() {
            const input = document.getElementById('ai-input');
            const question = input.value.trim();
            if (!question) return;
            const container = document.getElementById('chat-container');
            container.innerHTML += `<div class="chat-bubble chat-user">${question}</div>`;
            input.value = ''; scrollToBottom();
            
            const loadingId = "L" + Date.now();
            container.innerHTML += `<div id="${loadingId}" class="chat-bubble chat-ai italic opacity-50 text-xs">분석 중...</div>`;
            scrollToBottom();

            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ type: "ask_ai", question: question }), cache: 'no-store' });
                const result = await res.json();
                const loader = document.getElementById(loadingId);
                if(loader) loader.remove();
                if (result.result === "success") container.innerHTML += `<div class="chat-bubble chat-ai">${result.answer}</div>`;
                else container.innerHTML += `<div class="chat-bubble chat-ai text-rose-500">분석 실패. 다시 시도해 주세요.</div>`;
            } catch (e) { document.getElementById(loadingId).innerHTML = `<div class="text-rose-600">네트워크 오류</div>`; } finally { scrollToBottom(); }
        }

        async function fetchMeal() {
            if (!selectedDateStr || !schoolInfo) return;
            updateStatus('syncing', '급식 조회...');
            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ type: "get_meal", date: selectedDateStr, school: schoolInfo }) });
                const result = await res.json();
                if (result.result === "success") { document.getElementById('lunch_memo').value = result.menu; updateStatus('ok', '급식 로드됨'); }
            } catch (e) { updateStatus('error', '조회 실패'); }
        }

        async function handleSave() {
            if (!selectedDateStr) return;
            const getValue = id => { const el = document.getElementById(id); return el ? (el.type === 'checkbox' ? el.checked : el.value) : ''; };
            const record = { date: selectedDateStr, morning_sugar: getValue('morning_sugar'), morning_memo: getValue('morning_memo'), lunch_sugar: getValue('lunch_sugar'), lunch_memo: getValue('lunch_memo'), dinner_sugar: getValue('dinner_sugar'), dinner_memo: getValue('dinner_memo'), extra_memo: getValue('extra_memo'), body_weight: getValue('body_weight'), step_count: getValue('step_count'), is_success: getValue('is_success') };
            records[selectedDateStr] = record; localStorage.setItem('health_records_v6', JSON.stringify(records)); renderCalendar();
            try { await fetch(SCRIPT_URL, { method: "POST", headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(record) }); updateStatus('ok', '저장됨'); } catch (e) { updateStatus('error', '실패'); }
        }

        async function handleCloseInput() { 
            clearTimeout(saveTimer);
            await handleSave();
            switchView('calendar'); 
        }
        function changeMonth(s) { currentMonth.setMonth(currentMonth.getMonth() + s); renderCalendar(); if(activeView === 'chart') setTimeout(updateChart, 50); }
        
        function renderCalendar() {
            const body = document.getElementById('calendar-body'); if(!body) return;
            body.innerHTML = '<div class="calendar-grid text-center bg-slate-50 border-b border-slate-100 font-bold text-[11px] py-3 text-slate-500 uppercase tracking-widest"><div class="text-rose-500">Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div class="text-sky-500">Sat</div></div><div id="days-area" class="calendar-grid"></div>';
            const daysArea = document.getElementById('days-area'), yr = currentMonth.getFullYear(), mo = currentMonth.getMonth();
            document.getElementById('view-title').innerText = `${yr}년 ${mo + 1}월`;
            const now = new Date(), todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            const first = new Date(yr, mo, 1).getDay(), last = new Date(yr, mo + 1, 0).getDate();
            for (let i = 0; i < first; i++) daysArea.appendChild(Object.assign(document.createElement('div'), {className:'day-cell bg-slate-50/40'}));
            for (let d = 1; d <= last; d++) {
                const dateKey = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const r = records[dateKey], dObj = new Date(dateKey.replace(/-/g, '/')), isToday = dateKey === todayStr;
                const cell = Object.assign(document.createElement('div'), { className: `day-cell flex flex-col ${isToday ? 'today-border' : ''}` });
                let color = (dObj.getDay() === 0) ? "text-rose-500" : (dObj.getDay() === 6 ? "text-sky-500" : "text-slate-800");
                let isSuccess = r && (r.is_success === true || String(r.is_success).toUpperCase() === "TRUE");
                const mornRow = r && r.morning_sugar ? `🌥️<span class="${r.morning_sugar <= 100 ? 'text-sky-500' : 'text-rose-500'}">${r.morning_sugar}</span>` : `<span class="text-transparent">🌥️-</span>`;
                const lunchRow = r && r.lunch_sugar ? `☀️<span class="${r.lunch_sugar <= 180 ? 'text-sky-500' : 'text-rose-500'}">${r.lunch_sugar}</span>` : `<span class="text-transparent">☀️-</span>`;
                const dinnerRow = r && r.dinner_sugar ? `🌙<span class="${r.dinner_sugar <= 180 ? 'text-sky-500' : 'text-rose-500'}">${r.dinner_sugar}</span>` : `<span class="text-transparent">🌙-</span>`;
                cell.innerHTML = `<div class="flex justify-between items-center w-full mb-1 mobile-date-header"><div class="w-5 h-5 flex items-center justify-center ${isSuccess ? 'bg-sky-200 rounded-full' : ''}"><span class="text-[12px] md:text-[14px] font-black ${color}">${d}</span></div>${(r && r.step_count) ? `<span class="text-[9px] text-slate-400 font-bold">${r.step_count}</span>` : ''}</div><div class="flex-grow flex flex-col text-[11px] font-bold overflow-hidden"><div class="truncate">${mornRow}</div><div class="truncate">${lunchRow}</div><div class="truncate">${dinnerRow}</div></div>` + (r && r.body_weight ? `<div class="border-t border-slate-100 pt-0.5 text-[11px] text-slate-400 font-bold truncate">⚖️${r.body_weight}</div>` : `<div class="h-4"></div>`);
                cell.onclick = () => { selectedDateStr = dateKey; const rec = records[dateKey]||{}; document.getElementById('input-date-title').innerText = dateKey; ['morning_sugar','morning_memo','lunch_sugar','lunch_memo','dinner_sugar','dinner_memo','extra_memo','body_weight','step_count'].forEach(id => { const el = document.getElementById(id); if(el) { el.value = rec[id] || ''; if(id.includes('sugar')) validateInputColor(el, id === 'morning_sugar' ? 100 : 180); } }); const sEl = document.getElementById('is_success'); if(sEl) sEl.checked = (rec.is_success === true || String(rec.is_success).toUpperCase() === "TRUE"); switchView('input'); };
                daysArea.appendChild(cell);
            }
        }

        function setChartType(type) {
            currentChartType = type;
            const btnSugar = document.getElementById('btn-chart-sugar');
            const btnWeight = document.getElementById('btn-chart-weight');
            if (type === 'sugar') {
                btnSugar.classList.replace('bg-slate-100', 'bg-sky-500'); btnSugar.classList.replace('text-slate-500', 'text-white');
                btnWeight.classList.replace('bg-sky-500', 'bg-slate-100'); btnWeight.classList.replace('text-white', 'text-slate-500');
            } else {
                btnWeight.classList.replace('bg-slate-100', 'bg-sky-500'); btnWeight.classList.replace('text-slate-500', 'text-white');
                btnSugar.classList.replace('bg-sky-500', 'bg-slate-100'); btnSugar.classList.replace('text-white', 'text-slate-500');
            }
            updateChart();
        }

        function switchView(n) { 
            activeView = n; 
            document.querySelectorAll('.view-section').forEach(s=>s.classList.add('hidden')); 
            const target = document.getElementById(`view-${n}`); 
            if (target) target.classList.remove('hidden'); 
            
            const h = document.getElementById('main-header'); 
            if(h) h.style.display = (n === 'input' || n === 'analysis') ? 'none' : 'block'; 
            
            document.querySelectorAll('#bottom-nav button').forEach(b => b.classList.replace('tab-active', 'tab-inactive')); 
            const activeNav = document.getElementById(`nav-${n}`); 
            if (activeNav) activeNav.classList.replace('tab-inactive', 'tab-active'); 
            
            if(n==='calendar') renderCalendar(); 
            else if(n==='chart') setTimeout(updateChart, 50); 
            else if(n==='analysis') setTimeout(scrollToBottom, 50);
            window.scrollTo(0,0); 
        }

        function validateInputColor(el, t) { if(!el) return; el.style.color = !el.value ? '' : (parseFloat(el.value) <= t ? '#0ea5e9' : '#f43f5e'); }
        
        function updateChart() {
            const canvas = document.getElementById('mainChart'); if(!canvas) return;
            const lastDay = new Date(currentMonth.getFullYear(), currentMonth.getMonth()+1, 0).getDate();
            const labels = Array.from({length:lastDay}, (_,i)=>i+1);
            const getVal = (day, key) => { const dk = `${currentMonth.getFullYear()}-${String(currentMonth.getMonth()+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`; return parseFloat(records[dk]?.[key]) || null; };
            
            if (chartInstance) chartInstance.destroy();

            let datasets = [];
            let annotations = {};
            let yMin = undefined, yMax = undefined;

            if (currentChartType === 'sugar') {
                datasets = [
                    { label: '아침', data: labels.map(d => getVal(d, 'morning_sugar')), borderColor: '#7dd3fc', tension: 0.4, spanGaps: true, datalabels: { display: false } },
                    { label: '점심', data: labels.map(d => getVal(d, 'lunch_sugar')), borderColor: '#fb923c', tension: 0.4, spanGaps: true, datalabels: { display: false } },
                    { label: '저녁', data: labels.map(d => getVal(d, 'dinner_sugar')), borderColor: '#1e3a8a', tension: 0.4, spanGaps: true, datalabels: { display: false } }
                ];
                annotations = {
                    line100: { type: 'line', yMin: 100, yMax: 100, borderColor: '#334155', borderWidth: 2.5, borderDash: [5, 2] },
                    line180: { type: 'line', yMin: 180, yMax: 180, borderColor: '#334155', borderWidth: 2.5, borderDash: [5, 2] }
                };
            } else {
                datasets = [{ 
                    label: '체중', 
                    data: labels.map(d => getVal(d, 'body_weight')), 
                    borderColor: '#ef4444', 
                    tension: 0.4, 
                    spanGaps: true,
                    datalabels: {
                        display: true,
                        align: 'top',
                        offset: 4,
                        font: { weight: 'bold', size: 11 },
                        formatter: (val) => val ? val + 'kg' : ''
                    }
                }];
                yMin = 45; yMax = 65;
            }

            chartInstance = new Chart(canvas.getContext('2d'), { 
                type: 'line', 
                data: { labels, datasets }, 
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    scales: { 
                        y: { min: yMin, max: yMax, beginAtZero: false, ticks: { font: { weight: 'bold' } } } 
                    },
                    plugins: { 
                        legend: { display: true, position: 'bottom', labels: { boxWidth: 12, font: { size: 10, weight: 'bold' } } },
                        datalabels: { display: true },
                        annotation: { annotations }
                    } 
                } 
            });
        }
    </script>
</body>
</html>
