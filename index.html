<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>혈당 및 체중 매니저 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .main-wrapper { max-width: 1200px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); width: 100%; }
        
        .day-cell { 
            min-height: 130px; border-bottom: 1px solid #f1f5f9; border-right: 1px solid #f1f5f9; 
            padding: 4px 8px 8px 8px; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; position: relative; 
        }
        @media (max-width: 640px) { 
            .day-cell { min-height: 95px; max-height: 95px; padding: 3px 4px 3px 4px; } 
        }
        .day-cell:hover { background-color: #f1f5f9; }
        
        .sugar-input { width: 80px; padding: 6px; border: 1.5px solid #e2e8f0; border-radius: 10px; text-align: center; font-weight: 700; font-size: 15px; outline: none; background-color: #ffffff !important; height: 38px !important; }
        .sugar-input:focus { border-color: #0ea5e9; }
        
        /* 행간을 1.6으로 늘리고 하단 여백(pb-5)을 더 확보하여 잘림 방지 */
        .memo-area { 
            width: 100%; border: 1.5px solid #e2e8f0; border-radius: 10px; 
            padding: 10px 10px 20px 10px; line-height: 1.6; font-size: 15px; 
            outline: none; background-color: #fff; resize: none; 
        }

        .tab-active { color: #0ea5e9; font-weight: 800; position: relative; }
        .tab-active::after { content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); width: 24px; height: 3px; background-color: #0ea5e9; border-radius: 2px; }
        .tab-inactive { color: #94a3b8; }
        .custom-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 24px; border-radius: 20px; box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25); z-index: 10000; display: none; width: 90%; max-width: 500px; }
        .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.6); display: none; z-index: 9000; backdrop-filter: blur(4px); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #0ea5e9; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #analysis-result-content h3 { font-weight: 800; font-size: 1.1rem; margin-top: 1.2rem; color: #0369a1; border-left: 5px solid #0ea5e9; padding-left: 10px; }
        #analysis-result-content p { margin-bottom: 0.8rem; line-height: 1.7; font-size: 0.95rem; color: #334155; }
        .legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 4px; }
        #ai-question-input::placeholder { font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
    <div id="app-container" class="main-wrapper">
        <header id="main-header" class="bg-white sticky top-0 z-20 border-b border-slate-100 shadow-sm h-[64px]">
            <div class="relative flex items-center justify-center h-full max-w-4xl mx-auto w-full">
                <div class="flex items-center gap-6">
                    <button onclick="changeMonth(-1)" class="p-2 hover:bg-slate-50 rounded-full text-slate-400 font-bold transition">〈</button>
                    <h1 id="view-title" class="font-bold text-lg md:text-xl text-slate-800 min-w-[140px] text-center">연도 월</h1>
                    <button onclick="changeMonth(1)" class="p-2 hover:bg-slate-50 rounded-full text-slate-400 font-bold transition">〉</button>
                </div>
                <button onclick="switchView('settings')" class="absolute right-6 text-slate-400 hover:text-slate-600 transition-colors p-2"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></button>
                <div id="sync-status" class="absolute right-16 top-1/2 -translate-y-1/2 hidden"><div class="loader"></div></div>
            </div>
        </header>

        <main class="flex-grow p-3 md:p-6 overflow-x-hidden pb-10">
            <section id="view-calendar" class="view-section">
                <div class="max-w-4xl mx-auto border border-slate-200 rounded-3xl overflow-hidden shadow-sm bg-white">
                    <div class="calendar-grid text-center bg-slate-50 border-b border-slate-100 font-bold text-[11px] md:text-sm py-3 text-slate-500 uppercase tracking-wider">
                        <div class="text-rose-500">Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div class="text-sky-500">Sat</div>
                    </div>
                    <div id="calendar-body" class="calendar-grid"></div>
                </div>
            </section>

            <section id="view-input" class="view-section hidden max-w-4xl mx-auto">
                <div class="bg-white rounded-3xl border border-slate-200 p-4 md:p-6 shadow-xl mb-10">
                    <div class="flex justify-between items-center mb-6 border-b pb-3">
                        <h2 id="input-date-title" class="font-bold text-slate-800 text-xl tracking-tight"></h2>
                        <button onclick="handleCloseInput()" class="text-slate-300 hover:text-slate-500 text-3xl px-1 font-light">✕</button>
                    </div>
                    <div class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="bg-slate-50/50 px-3 py-2 rounded-2xl border border-slate-200">
                                <div class="flex items-center justify-between mb-3"><span class="font-bold text-slate-700 text-sm">🌥️ 아침 공복</span><input type="number" id="m_val" class="sugar-input" oninput="validateInputColor(this, 100)" placeholder="0"></div>
                                <textarea id="m_memo" class="memo-area h-[40px] pt-2 pb-[6px] px-[10px]" placeholder="아침 메모" spellcheck="false"></textarea>
                            </div>
                            <div class="bg-orange-50/40 px-3 py-2 rounded-2xl border border-orange-100 flex flex-col gap-2.5">
                                <div class="flex items-center">
                                    <div class="flex items-center"><span class="w-[60px] font-bold text-orange-800 text-sm whitespace-nowrap">⚖️ 체중</span><div style="width: 15px;"></div><div class="flex items-center gap-1.5"><input type="number" step="0.1" id="weight_val" class="sugar-input !w-[75px]" placeholder="0.0" spellcheck="false"><span class="text-[11px] font-bold text-orange-800/60">kg</span></div></div>
                                    <div class="ml-auto flex items-center"><span class="w-[50px] font-bold text-orange-800 text-sm whitespace-nowrap">✨ 성공</span><div style="width: 10px;"></div><div class="flex items-center justify-center bg-white/5 p-1 rounded-lg border border-orange-200/10"><input type="checkbox" id="toilet_val" class="w-5 h-5 accent-sky-400 cursor-pointer"></div></div>
                                </div>
                                <div class="flex items-center border-t border-orange-200/30 pt-2"><span class="w-[60px] font-bold text-orange-800 text-sm whitespace-nowrap">👟 걸음</span><div style="width: 15px;"></div><div class="flex items-center gap-1.5"><input type="number" id="walk_val" class="sugar-input !w-[75px]" placeholder="0" spellcheck="false"><span class="text-[11px] font-bold text-orange-800/60">보</span></div></div>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="bg-slate-50/50 px-3 py-2 rounded-2xl border border-slate-200">
                                <div class="flex items-center justify-between mb-3"><span class="font-bold text-slate-700 text-sm">☀️ 점심 혈당</span><div class="flex gap-2 items-center"><button onclick="fetchMealData()" class="bg-white p-2 rounded-xl border border-slate-200 text-slate-400 hover:text-slate-600"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button><input type="number" id="l_val" class="sugar-input" oninput="validateInputColor(this, 180)" placeholder="0" spellcheck="false"></div></div>
                                <textarea id="l_memo" class="memo-area h-32" placeholder="점심 메모" spellcheck="false"></textarea>
                            </div>
                            <div class="bg-slate-50/50 px-3 py-2 rounded-2xl border border-slate-200">
                                <div class="flex items-center justify-between mb-3"><span class="font-bold text-slate-700 text-sm">🌙 저녁 혈당</span><input type="number" id="d_val" class="sugar-input" oninput="validateInputColor(this, 180)" placeholder="0" spellcheck="false"></div>
                                <textarea id="d_memo" class="memo-area h-32" placeholder="저녁 메모" spellcheck="false"></textarea>
                            </div>
                        </div>
                        <div class="bg-slate-50/50 px-3 py-2 rounded-2xl border border-slate-200 pb-6"><label class="block text-xs font-bold text-slate-500 mb-2">📝 기타 메모</label><textarea id="memo_val" class="memo-area h-[60px] py-2" placeholder="기타 특이사항" spellcheck="false"></textarea></div>
                    </div>
                </div>
            </section>

            <section id="view-chart" class="view-section hidden max-w-4xl mx-auto">
                <div class="bg-white rounded-3xl border border-slate-200 p-4 md:p-6 shadow-sm">
                    <div class="flex justify-between items-center mb-6">
                        <div class="flex items-center gap-2">
                            <button onclick="setChartType('sugar')" id="chart-btn-sugar" class="flex items-center gap-2 px-4 py-2 rounded-xl bg-sky-500 text-white text-sm font-bold transition shadow-sm"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35s-8-6.14-8-11.35c0-4.42 3.58-8 8-8s8 3.58 8 8c0 5.21-8 11.35-8 11.35z"/></svg>혈당</button>
                            <button onclick="setChartType('weight')" id="chart-btn-weight" class="flex items-center gap-2 px-4 py-2 rounded-xl bg-slate-100 text-slate-500 text-sm font-bold transition">⚖️ 체중</button>
                        </div>
                        <div id="custom-legend" class="flex items-center gap-3 text-[11px] font-bold text-slate-500"></div>
                    </div>
                    <div id="mainChartContainer" class="w-full h-[400px] relative"><canvas id="mainChart"></canvas></div>
                </div>
            </section>
            
            <section id="view-analysis" class="view-section hidden max-w-4xl mx-auto text-center">
                <div class="bg-white rounded-[2.5rem] border border-slate-200 p-6 md:p-10 shadow-sm mt-2 md:mt-0">
                    <div class="flex items-center justify-between mb-8"><h2 class="text-xl font-black text-slate-800 leading-tight">🧠 AI 스마트 분석</h2><button onclick="runAIAnalysis('general')" id="analysis-btn" class="bg-sky-500 text-white px-3 py-2 rounded-xl text-[11px] font-bold shadow-sm hover:bg-sky-600 transition active:scale-95 disabled:bg-slate-300">📊 전체 리포트</button></div>
                    <div class="bg-slate-50 rounded-3xl p-4 mb-8 border border-slate-200 text-left"><div class="flex gap-2 items-stretch"><textarea id="ai-question-input" class="flex-grow bg-white border border-slate-200 rounded-2xl p-4 text-sm focus:border-sky-400 outline-none shadow-sm resize-none" rows="2" placeholder="기록 데이터 기반 질문 또는 내일 급식 분석 요청" spellcheck="false"></textarea><button onclick="runAIAnalysis('question')" id="ask-btn" class="bg-slate-800 text-white w-14 rounded-2xl hover:bg-slate-700 transition active:scale-95 disabled:bg-slate-300 shadow-md flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button></div></div>
                    <div id="analysis-loading" class="hidden py-16"><div class="loader mb-4"></div><p class="text-sky-600 font-black animate-pulse">데이터 정밀 분석 중...</p></div>
                    <div id="analysis-result-container" class="hidden text-left bg-white border border-slate-100 rounded-3xl p-8 shadow-inner"><div id="analysis-result-content" class="whitespace-pre-wrap"></div></div>
                </div>
            </section>

            <section id="view-settings" class="view-section hidden max-w-4xl mx-auto">
                <div class="bg-white rounded-3xl border border-slate-200 p-8 shadow-sm">
                    <div class="flex justify-between items-center mb-8"><h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">⚙️ 학교 설정</h2><button onclick="switchView('calendar')" class="text-slate-300 text-2xl px-2">✕</button></div>
                    <div id="current-school-info" class="p-5 bg-sky-50 text-sky-700 rounded-2xl font-bold mb-6 italic text-center"><span id="school-name-display">학교 미설정</span></div>
                    <div class="flex gap-2"><input type="text" id="school-search-input" class="flex-grow border border-slate-200 rounded-2xl px-5 py-3.5 bg-slate-50 shadow-inner outline-none focus:border-sky-300" placeholder="학교명 검색" spellcheck="false"><button onclick="searchSchool()" class="bg-slate-800 text-white px-8 rounded-2xl font-bold shadow-md active:scale-95 transition">검색</button></div>
                    <div id="school-search-results" class="max-h-64 overflow-y-auto mt-6 space-y-2 rounded-xl"></div>
                </div>
            </section>
        </main>

        <nav id="bottom-nav" class="fixed bottom-3 left-1/2 -translate-x-1/2 w-[94%] max-w-md bg-white/90 backdrop-blur-xl border border-slate-200 flex justify-around py-1.5 md:py-4 rounded-[2.5rem] shadow-2xl z-50 transition-all duration-300">
            <button onclick="handleAutoSaveBeforeSwitch('calendar')" id="nav-calendar" class="flex flex-col items-center gap-0.5 md:gap-1 tab-active flex-1"><span class="text-xl md:text-2xl">📅</span><span class="text-[9px] md:text-[11px] font-bold">달력</span></button>
            <button onclick="handleAutoSaveBeforeSwitch('chart')" id="nav-chart" class="flex flex-col items-center gap-0.5 md:gap-1 tab-inactive flex-1"><span class="text-xl md:text-2xl">📈</span><span class="text-[9px] md:text-[11px] font-bold">차트</span></button>
            <button onclick="handleAutoSaveBeforeSwitch('analysis')" id="nav-analysis" class="flex flex-col items-center gap-0.5 md:gap-1 tab-inactive flex-1"><span class="text-xl md:text-2xl">💡</span><span class="text-[9px] md:text-[11px] font-bold">분석</span></button>
        </nav>
    </div>

    <div id="overlay" class="overlay" onclick="closeModal()"></div>
    <div id="message-box" class="custom-modal">
        <div id="message-text" class="text-slate-700 font-bold mb-8 leading-relaxed text-left max-h-[350px] overflow-y-auto whitespace-pre-wrap text-sm"></div>
        <button onclick="closeModal()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold shadow-lg transition active:scale-95">확인</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzzy5rTRkMCM_yGobsETJqY8oH3GQsAgs6IQQgomm0-vLe6AbaeIMOWBklm65B0TUwa/exec";
        let currentMonth = new Date(), records = {}, schoolInfo = null, selectedDateStr = null, isSyncing = false, chartInstance = null, currentChartType = 'sugar', activeView = 'calendar';

        window.onload = async () => { loadLocalData(); renderCalendar(); displayCurrentSchool(); await syncWithCloud(); };
        function loadLocalData() { try { records = JSON.parse(localStorage.getItem('health_records_v6')) || {}; schoolInfo = JSON.parse(localStorage.getItem('health_school_v6')); } catch(e) { records = {}; } }
        async function syncWithCloud() {
            if (isSyncing) return; isSyncing = true; document.getElementById('sync-status').classList.remove('hidden');
            try { const response = await fetch(SCRIPT_URL); const data = await response.json(); if (data.records) { records = data.records; localStorage.setItem('health_records_v6', JSON.stringify(records)); renderCalendar(); } if (data.schoolInfo) { schoolInfo = data.schoolInfo; localStorage.setItem('health_school_v6', JSON.stringify(schoolInfo)); displayCurrentSchool(); } } catch (e) { } finally { isSyncing = false; document.getElementById('sync-status').classList.add('hidden'); }
        }
        async function handleCloseInput() { await handleSave(); switchView('calendar'); }
        async function handleAutoSaveBeforeSwitch(targetView) { if (activeView === 'input') { await handleSave(); } switchView(targetView); }
        async function handleSave() {
            if (!selectedDateStr) return;
            const record = { date: selectedDateStr, m_val: document.getElementById('m_val').value, m_memo: document.getElementById('m_memo').value, l_val: document.getElementById('l_val').value, l_memo: document.getElementById('l_memo').value, d_val: document.getElementById('d_val').value, d_memo: document.getElementById('d_memo').value, memo: document.getElementById('memo_val').value, weight: document.getElementById('weight_val').value, walk: document.getElementById('walk_val').value, toilet: document.getElementById('toilet_val').checked };
            records[selectedDateStr] = record; localStorage.setItem('health_records_v6', JSON.stringify(records));
            try { fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(record) }); } catch (e) { }
        }
        async function runAIAnalysis(mode) {
            const btnA = document.getElementById('analysis-btn'), btnB = document.getElementById('ask-btn'), loading = document.getElementById('analysis-loading'), container = document.getElementById('analysis-result-container'), content = document.getElementById('analysis-result-content'), qInput = document.getElementById('ai-question-input');
            if (Object.keys(records).length === 0) { showMessageBox("기록된 데이터가 부족합니다."); return; }
            btnA.disabled = btnB.disabled = true; loading.classList.remove('hidden'); container.classList.add('hidden');
            const dataStr = Object.entries(records).sort((a,b)=>a[0].localeCompare(b[0])).slice(-30).map(([d,r])=>`${d}: 혈당(${r.m_val}/${r.l_val}/${r.d_val}), 체중(${r.weight}), 걸음(${r.walk}), 성공(${r.toilet?'Y':'N'})`).join('\n');
            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ type: "analyze", prompt: mode==='question' ? qInput.value : '기록 정밀 분석 리포트', dataStr: dataStr }) });
                const result = await res.json();
                if (result.error) throw new Error(typeof result.error === 'object' ? JSON.stringify(result.error) : result.error);
                content.innerHTML = result?.candidates?.[0]?.content?.parts?.[0]?.text.replace(/^### (.*$)/gim, '<h3>$1</h3>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
                loading.classList.add('hidden'); container.classList.remove('hidden');
            } catch (e) { showMessageBox(`분석 실패: ${e.message}`); loading.classList.add('hidden'); } finally { btnA.disabled = btnB.disabled = false; }
        }

        function renderCalendar() {
            const body = document.getElementById('calendar-body'); body.innerHTML = '';
            const yr = currentMonth.getFullYear(), mo = currentMonth.getMonth();
            document.getElementById('view-title').innerText = `${yr}년 ${mo + 1}월`;
            const first = new Date(yr, mo, 1).getDay(), last = new Date(yr, mo + 1, 0).getDate();
            const isMobile = window.innerWidth < 640;
            
            const now = new Date();
            const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

            for (let i = 0; i < first; i++) body.appendChild(Object.assign(document.createElement('div'), {className:'day-cell bg-slate-50/50'}));
            for (let d = 1; d <= last; d++) {
                const dateKey = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const cell = Object.assign(document.createElement('div'), {className:'day-cell'});
                if (dateKey === todayStr) cell.classList.add('ring-2', 'ring-inset', 'ring-sky-400/60', 'z-10');

                const r = records[dateKey], dObj = new Date(dateKey.replace(/-/g, '/')), dayOfWeek = dObj.getDay();
                let dayColorClass = (dayOfWeek === 0) ? "text-rose-500" : (dayOfWeek === 6 ? "text-sky-500" : "text-slate-800");
                
                let headerContent = `<div class="flex items-center justify-between w-full">`;
                const circleSize = isMobile ? 'w-[18px] h-[18px]' : 'w-6 h-6';
                const successCircle = (r && r.toilet) ? `bg-sky-100 text-sky-600 rounded-full ${circleSize} flex items-center justify-center` : `${circleSize} flex items-center justify-center`;
                headerContent += `<div class="${successCircle}"><span class="text-[10px] md:text-xs font-bold ${dayColorClass}">${d}</span></div>`;
                if (r && r.walk) headerContent += `<span class="text-[8px] md:text-[10px] text-slate-500 font-bold ml-1">${r.walk}<span class="hidden md:inline">보</span></span>`;
                headerContent += `</div>`;

                let cellContent = headerContent;
                if (r) {
                    const chk = (v, t) => parseInt(v) <= t ? 'text-sky-500' : 'text-rose-500';
                    // 1. 모바일 항목 위치 고정 (gap-[2px]로 축소하여 튀어나감 방지)
                    cellContent += `<div class="text-[9px] md:text-[11px] font-bold flex flex-col flex-grow ${isMobile ? 'gap-[2px]' : 'gap-0'} mt-1">`;
                    cellContent += `<div class="h-[13px] overflow-hidden">${r.m_val ? `🌥️ <span class="${chk(r.m_val, 100)}">${r.m_val}</span>` : ''}</div>`;
                    cellContent += `<div class="h-[13px] overflow-hidden">${r.l_val ? `☀️ <span class="${chk(r.l_val, 180)}">${r.l_val}</span>` : ''}</div>`;
                    cellContent += `<div class="h-[13px] overflow-hidden">${r.d_val ? `🌙 <span class="${chk(r.d_val, 180)}">${r.d_val}</span>` : ''}</div>`;
                    // 체중은 항상 맨 아래 위치하도록 mt-auto 사용하며 높이 15px로 고정
                    cellContent += `<div class="mt-auto border-t pt-0.5 text-slate-500 font-bold h-[15px] overflow-hidden">${r.weight ? `⚖️ ${r.weight}${isMobile ? "" : "kg"}` : ''}</div>`;
                    cellContent += '</div>';
                } else {
                    cellContent += `<div class="flex-grow"></div>`; 
                }
                
                cell.innerHTML = cellContent;
                cell.onclick = () => { selectedDateStr = dateKey; const rec = records[dateKey]||{}; const days = ['일', '월', '화', '수', '목', '금', '토']; document.getElementById('input-date-title').innerText = `${dateKey}(${days[dayOfWeek]})`; ['m_val','m_memo','l_val','l_memo','d_val','d_memo','weight_val','walk_val','memo_val'].forEach(id => { const el = document.getElementById(id); if (el) { el.value = rec[id === 'memo_val' ? 'memo' : (id === 'weight_val' ? 'weight' : (id === 'walk_val' ? 'walk' : id))] || ''; if (id === 'm_val') validateInputColor(el, 100); if (id === 'l_val' || id === 'd_val') validateInputColor(el, 180); } }); document.getElementById('toilet_val').checked = !!rec.toilet; switchView('input'); };
                body.appendChild(cell);
            }
        }

        function switchView(n) {
            activeView = n; document.querySelectorAll('.view-section').forEach(s=>s.classList.add('hidden')); document.getElementById(`view-${n}`).classList.remove('hidden');
            const h = document.getElementById('main-header'), nav = document.getElementById('bottom-nav');
            if (n === 'input' || n === 'analysis') { 
                h.style.display = 'none'; 
                if (n === 'input') { nav.classList.remove('fixed', 'bottom-3', '-translate-x-1/2', 'left-1/2'); nav.classList.add('relative', 'mx-auto', 'mt-4', 'mb-10'); }
            } else { 
                h.style.display = 'block'; 
                nav.classList.add('fixed', 'bottom-3', '-translate-x-1/2', 'left-1/2'); nav.classList.remove('relative', 'mx-auto', 'mt-4', 'mb-10'); 
            }
            document.querySelectorAll('#bottom-nav button').forEach(b => { if (b.id === `nav-${n}`) { b.classList.add('tab-active'); b.classList.remove('tab-inactive'); } else { b.classList.remove('tab-active'); b.classList.add('tab-inactive'); } });
            if(n==='calendar') renderCalendar(); else if(n==='chart') setTimeout(updateChart, 50); window.scrollTo(0,0);
        }
        function validateInputColor(el, t) { if (!el) return; const val = parseInt(el.value); el.style.color = !el.value ? '' : (val <= t ? '#0ea5e9' : '#f43f5e'); }
        function changeMonth(s) { currentMonth.setMonth(currentMonth.getMonth() + s); renderCalendar(); }
        function showMessageBox(t) { document.getElementById('message-text').innerText = t; document.getElementById('overlay').style.display = 'block'; document.getElementById('message-box').style.display = 'block'; }
        function closeModal() { document.getElementById('overlay').style.display = 'none'; document.getElementById('message-box').style.display = 'none'; }
        async function searchSchool() {
            const q = document.getElementById('school-search-input').value; if(!q) return;
            const resultsDiv = document.getElementById('school-search-results'); resultsDiv.innerHTML = '<div class="text-center py-4 text-slate-400">검색 중...</div>';
            try { const res = await fetch(`https://open.neis.go.kr/hub/schoolInfo?Type=json&SCHUL_NM=${encodeURIComponent(q)}`); const data = await res.json(); if(data.schoolInfo) resultsDiv.innerHTML = data.schoolInfo[1].row.map(s => `<div onclick="selectSchool('${s.ATPT_OFCDC_SC_CODE}','${s.SD_SCHUL_CODE}','${s.SCHUL_NM}')" class="p-4 border border-slate-100 bg-white hover:bg-sky-50 cursor-pointer text-sm font-bold transition rounded-2xl shadow-sm">${s.SCHUL_NM}</div>`).join(''); else resultsDiv.innerHTML = '<div class="text-center py-4 text-slate-400 italic">결과 없음</div>'; } catch(e) { }
        }
        async function selectSchool(atpt, schul, name) { schoolInfo = { ATPT_OFCDC_SC_CODE: atpt, SD_SCHUL_CODE: schul, SCHUL_NM: name }; localStorage.setItem('health_school_v6', JSON.stringify(schoolInfo)); displayCurrentSchool(); document.getElementById('school-search-results').innerHTML = ''; try { await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ type: "settings", schoolInfo }) }); } catch(e) {} showMessageBox(`${name} 설정 성공`); }
        function displayCurrentSchool() { document.getElementById('school-name-display').innerText = schoolInfo ? `✅ 설정: ${schoolInfo.SCHUL_NM}` : "❌ 미설정"; }
        async function fetchMealData() {
            if(!schoolInfo || !selectedDateStr) { showMessageBox("학교 설정을 먼저 해주세요."); switchView('settings'); return; }
            try { const res = await fetch(`https://open.neis.go.kr/hub/mealServiceDietInfo?Type=json&ATPT_OFCDC_SC_CODE=${schoolInfo.ATPT_OFCDC_SC_CODE}&SD_SCHUL_CODE=${schoolInfo.SD_SCHUL_CODE}&MLSV_YMD=${selectedDateStr.replace(/-/g,'')}`); const data = await res.json(); if(data.mealServiceDietInfo) { const row = data.mealServiceDietInfo[1].row.find(r => r.MMEAL_SC_NM.includes('중식')); if(row) document.getElementById('l_memo').value = row.DDISH_NM.replace(/<br\/>/g, '\n').replace(/\([^)]*\)/g, '').replace(/[\*\.]/g, '').trim(); } } catch(e) { }
        }
        function updateChart() {
            const canvas = document.getElementById('mainChart'); if(!canvas) return;
            const ctx = canvas.getContext('2d'); const yr = currentMonth.getFullYear(), mo = currentMonth.getMonth(), last = new Date(yr, mo+1, 0).getDate(), labels = Array.from({length:last}, (_,i)=>i+1);
            const getVal = (day, key) => { const dateKey = `${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`; const val = records[dateKey]?.[key]; return (val && val !== "") ? parseFloat(val) : null; };
            const legendDiv = document.getElementById('custom-legend');
            if (currentChartType === 'sugar') { legendDiv.innerHTML = `<div class="flex items-center"><span class="legend-dot" style="background:#7dd3fc"></span>아침</div><div class="flex items-center"><span class="legend-dot" style="background:#fb923c"></span>점심</div><div class="flex items-center"><span class="legend-dot" style="background:#1e3a8a"></span>저녁</div>`; } else { legendDiv.innerHTML = `<div class="flex items-center"><span class="legend-dot" style="background:#0ea5e9"></span>체중(kg)</div>`; }
            let datasets = [];
            let options = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { lineWidth: (context) => (context.tick.value === 100 || context.tick.value === 180) ? 2 : 1, color: (context) => (context.tick.value === 100 || context.tick.value === 180) ? 'rgba(0, 0, 0, 0.4)' : 'rgba(0, 0, 0, 0.05)' } } }, spanGaps: true };
            const weightLabelsPlugin = { id: 'weightLabels', afterDatasetsDraw: (chart) => { if (currentChartType !== 'weight') return; const ctx = chart.ctx, fontSize = window.innerWidth < 640 ? 9 : 10; chart.data.datasets.forEach((dataset, i) => { const meta = chart.getDatasetMeta(i); meta.data.forEach((element, index) => { const data = dataset.data[index]; if (data === null) return; ctx.fillStyle = '#64748b'; ctx.font = `bold ${fontSize}px Noto Sans KR`; ctx.textAlign = 'center'; ctx.fillText(data, element.x, element.y - 10); }); }); } };
            if (currentChartType === 'sugar') { datasets = [{ label: '아침', data: labels.map(d => getVal(d, 'm_val')), borderColor: '#7dd3fc', backgroundColor: '#7dd3fc', tension: 0.3, fill: false }, { label: '점심', data: labels.map(d => getVal(d, 'l_val')), borderColor: '#fb923c', backgroundColor: '#fb923c', tension: 0.3, fill: false }, { label: '저녁', data: labels.map(d => getVal(d, 'd_val')), borderColor: '#1e3a8a', backgroundColor: '#1e3a8a', tension: 0.3, fill: false }]; options.scales.y.min = 70; options.scales.y.max = 250; options.scales.y.ticks = { stepSize: 10 }; } else { datasets = [{ label: '체중(kg)', data: labels.map(d => getVal(d, 'weight')), borderColor: '#0ea5e9', fill: false, tension: 0.3 }]; options.scales.y.min = 45; options.scales.y.max = 65; }
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, { type: 'line', data: { labels, datasets }, options: options, plugins: [weightLabelsPlugin] });
        }
        function setChartType(t) { currentChartType = t; const btnS = document.getElementById('chart-btn-sugar'), btnW = document.getElementById('chart-btn-weight'); if (t === 'sugar') { btnS.className = "flex items-center gap-2 px-4 py-2 rounded-xl bg-sky-500 text-white text-sm font-bold transition shadow-sm"; btnW.className = "flex items-center gap-2 px-4 py-2 rounded-xl bg-slate-100 text-slate-500 text-sm font-bold transition"; } else { btnS.className = "flex items-center gap-2 px-4 py-2 rounded-xl bg-slate-100 text-slate-500 text-sm font-bold transition"; btnW.className = "flex items-center gap-2 px-4 py-2 rounded-xl bg-sky-500 text-white text-sm font-bold transition shadow-sm"; } updateChart(); }
    </script>
</body>
</html>
