<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>혈당 및 체중 매니저 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0; padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .main-wrapper {
            max-width: 1200px; margin: 0 auto;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex; flex-direction: column;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); width: 100%; }

        .day-cell {
            min-height: 130px; 
            border-bottom: 1px solid #f1f5f9;
            border-right: 1px solid #f1f5f9;
            padding: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
        }
        @media (max-width: 640px) { .day-cell { min-height: 110px; padding: 6px; } }
        .day-cell:hover { background-color: #f1f5f9; }

        .sugar-input {
            width: 80px; padding: 6px;
            border: 1.5px solid #e2e8f0; border-radius: 10px;
            text-align: center; font-weight: 700;
            outline: none; background-color: #f8fafc;
            height: 38px !important;
        }
        .sugar-input:focus { border-color: #0ea5e9; }

        .memo-area {
            width: 100%; border: 1.5px solid #e2e8f0; border-radius: 10px;
            padding: 10px; line-height: 1.5; font-size: 15px;
            outline: none; background-color: #fff;
            resize: none; /* 드래그 크기 조절 금지 */
        }

        .tab-active { 
            color: #0ea5e9; 
            font-weight: 800; 
            position: relative;
        }
        .tab-active::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 3px;
            background-color: #0ea5e9;
            border-radius: 2px;
        }
        .tab-inactive { color: #94a3b8; }

        .custom-modal {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white; padding: 24px;
            border-radius: 20px; box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
            z-index: 10000; display: none;
            width: 90%; max-width: 500px;
        }

        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.6);
            display: none; z-index: 9000;
            backdrop-filter: blur(4px);
        }
        
        .loader {
            border: 3px solid #f3f3f3; border-top: 3px solid #0ea5e9; border-radius: 50%;
            width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #analysis-result-content h3 { font-weight: 800; font-size: 1.2rem; margin-top: 1.5rem; color: #0369a1; border-left: 5px solid #0ea5e9; padding-left: 10px; }
        #analysis-result-content p { margin-bottom: 1rem; line-height: 1.8; font-size: 1rem; color: #334155; }
    </style>
</head>
<body>

    <div id="app-container" class="main-wrapper">
        <header id="main-header" class="bg-white sticky top-0 z-20 border-b border-slate-100 shadow-sm transition-all duration-300">
            <div class="relative flex items-center justify-center p-4 max-w-4xl mx-auto w-full">
                <div class="flex items-center gap-6">
                    <button onclick="changeMonth(-1)" class="p-2 hover:bg-slate-50 rounded-full text-slate-400 font-bold transition">〈</button>
                    <div class="flex items-center gap-2">
                        <h1 id="view-title" class="font-bold text-lg md:text-xl text-slate-800 min-w-[140px] text-center">연도 월</h1>
                        <button onclick="switchView('settings')" class="text-slate-400 hover:text-slate-600 transition-colors p-2" title="설정">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                    <button onclick="changeMonth(1)" class="p-2 hover:bg-slate-50 rounded-full text-slate-400 font-bold transition">〉</button>
                </div>
                <div id="sync-status" class="absolute right-14 top-1/2 -translate-y-1/2 hidden"><div class="loader"></div></div>
            </div>
        </header>

        <main class="flex-grow p-3 md:p-6 overflow-x-hidden pb-40">
            <!-- 달력 섹션 -->
            <section id="view-calendar" class="view-section">
                <div class="max-w-4xl mx-auto border border-slate-200 rounded-3xl overflow-hidden shadow-sm bg-white">
                    <div class="calendar-grid text-center bg-slate-50 border-b border-slate-100 font-bold text-[11px] md:text-sm py-3 text-slate-500 uppercase tracking-wider">
                        <div class="text-rose-500">Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div class="text-sky-500">Sat</div>
                    </div>
                    <div id="calendar-body" class="calendar-grid"></div>
                </div>
            </section>

            <!-- 입력 섹션 -->
            <section id="view-input" class="view-section hidden max-w-4xl mx-auto">
                <div class="bg-white rounded-3xl border border-slate-200 p-4 md:p-6 shadow-xl">
                    <div class="flex justify-between items-center mb-6 border-b pb-3">
                        <h2 id="input-date-title" class="font-bold text-slate-800 text-xl tracking-tight"></h2>
                        <div class="flex items-center gap-2">
                            <button onclick="handleSave()" id="save-btn" class="bg-sky-500 hover:bg-sky-600 text-white px-6 py-2 rounded-2xl font-bold shadow-md transition active:scale-95 disabled:opacity-50 text-sm">저장</button>
                            <button onclick="switchView('calendar')" class="text-slate-300 hover:text-slate-500 text-3xl px-1 font-light">✕</button>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="bg-blue-50/40 p-3 rounded-2xl border border-blue-100">
                                <div class="flex items-center justify-between mb-3">
                                    <!-- 글씨 색상 수정: text-blue-800 -> text-slate-700 -->
                                    <span class="font-bold text-slate-700 text-sm">🌥️ 아침 공복</span>
                                    <input type="number" id="m_val" class="sugar-input" oninput="validateInputColor(this, 100)" placeholder="0" spellcheck="false">
                                </div>
                                <!-- 아침 메모 높이 40px, 하단 여백 2px 축소 (pb-[6px]), spellcheck 비활성화 -->
                                <textarea id="m_memo" class="memo-area h-[40px] pt-2 pb-[6px] px-[10px]" placeholder="아침 메모" spellcheck="false"></textarea>
                            </div>
                            <div class="bg-orange-50/40 p-3 rounded-2xl border border-orange-100 flex flex-col justify-center">
                                <div class="flex items-center justify-between">
                                    <span class="font-bold text-orange-800 text-sm">⚖️ 체중 기록</span>
                                    <input type="number" step="0.1" id="weight_val" class="sugar-input" placeholder="00.0" spellcheck="false">
                                </div>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="bg-slate-50/50 p-3 rounded-2xl border border-slate-200">
                                <div class="flex items-center justify-between mb-3">
                                    <span class="font-bold text-slate-700 text-sm">☀️ 점심 혈당</span>
                                    <div class="flex gap-2">
                                        <input type="number" id="l_val" class="sugar-input" oninput="validateInputColor(this, 180)" spellcheck="false">
                                        <button onclick="fetchMealData()" class="bg-white p-2 rounded-xl border border-slate-200 text-sky-500">🍴</button>
                                    </div>
                                </div>
                                <textarea id="l_memo" class="memo-area h-32" placeholder="점심 식단" spellcheck="false"></textarea>
                            </div>
                            <div class="bg-slate-50/50 p-3 rounded-2xl border border-slate-200">
                                <div class="flex items-center justify-between mb-3">
                                    <span class="font-bold text-slate-700 text-sm">🌙 저녁 혈당</span>
                                    <input type="number" id="d_val" class="sugar-input" oninput="validateInputColor(this, 180)" spellcheck="false">
                                </div>
                                <textarea id="d_memo" class="memo-area h-32" placeholder="저녁 식단" spellcheck="false"></textarea>
                            </div>
                        </div>
                        <div class="bg-slate-50/50 p-3 rounded-2xl border border-slate-200">
                            <label class="block text-xs font-bold text-slate-500 mb-2">📝 기타 메모</label>
                            <!-- 기타 메모 높이 60px, spellcheck 비활성화 -->
                            <textarea id="memo_val" class="memo-area h-[60px] py-2" placeholder="기타 특이사항" spellcheck="false"></textarea>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 차트 섹션 -->
            <section id="view-chart" class="view-section hidden max-w-4xl mx-auto">
                <div class="bg-white rounded-3xl border border-slate-200 p-6 text-center shadow-sm">
                    <h2 class="font-bold text-slate-800 mb-6 text-lg">데이터 추이</h2>
                    <div id="mainChartContainer" class="w-full h-[400px] relative"><canvas id="mainChart"></canvas></div>
                    <div class="flex justify-center gap-4 mt-8">
                        <button onclick="setChartType('sugar')" class="px-8 py-3 rounded-2xl bg-sky-500 text-white font-bold transition">🩸 혈당</button>
                        <button onclick="setChartType('weight')" class="px-8 py-3 rounded-2xl bg-slate-100 text-slate-500 font-bold transition">⚖️ 체중</button>
                    </div>
                </div>
            </section>

            <!-- AI 분석 섹션 -->
            <section id="view-analysis" class="view-section hidden max-w-4xl mx-auto text-center">
                <div class="bg-white rounded-[2.5rem] border border-slate-200 p-6 md:p-10 shadow-sm">
                    <h2 class="text-2xl font-black text-slate-800 mb-6">🧠 AI 스마트 분석</h2>
                    <div class="bg-slate-50 rounded-3xl p-5 mb-8 border border-slate-200 text-left">
                        <textarea id="ai-question-input" class="w-full bg-white border border-slate-200 rounded-2xl p-4 text-sm focus:border-sky-400 outline-none mb-4 shadow-sm" rows="3" placeholder="기록된 데이터를 바탕으로 질문하세요." spellcheck="false"></textarea>
                        <div class="flex gap-3">
                            <button onclick="runAIAnalysis('general')" id="analysis-btn" class="flex-1 bg-sky-500 text-white py-4 rounded-2xl font-bold shadow-lg transition active:scale-95 disabled:bg-slate-300">📊 전체 리포트</button>
                            <button onclick="runAIAnalysis('question')" id="ask-btn" class="flex-1 bg-slate-800 text-white py-4 rounded-2xl font-bold transition active:scale-95 disabled:bg-slate-300 shadow-md">💬 질문하기</button>
                        </div>
                    </div>
                    <div id="analysis-loading" class="hidden py-16"><div class="loader mb-4"></div><p class="text-sky-600 font-black animate-pulse">데이터 정밀 분석 중...</p></div>
                    <div id="analysis-result-container" class="hidden text-left bg-white border border-slate-100 rounded-3xl p-8 shadow-inner">
                        <div id="analysis-result-content" class="whitespace-pre-wrap"></div>
                    </div>
                </div>
            </section>

            <!-- 학교 설정 섹션 -->
            <section id="view-settings" class="view-section hidden max-w-4xl mx-auto">
                <div class="bg-white rounded-3xl border border-slate-200 p-8 shadow-sm">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">⚙️ 학교 설정</h2>
                        <button onclick="switchView('calendar')" class="text-slate-300 text-2xl px-2">✕</button>
                    </div>
                    <div id="current-school-info" class="p-5 bg-sky-50 text-sky-700 rounded-2xl font-bold mb-6 italic text-center">
                        <span id="school-name-display">학교 미설정</span>
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="school-search-input" class="flex-grow border border-slate-200 rounded-2xl px-5 py-3.5 bg-slate-50 shadow-inner outline-none focus:border-sky-300" placeholder="학교명 입력 (예: 서울고)" spellcheck="false">
                        <button onclick="searchSchool()" class="bg-slate-800 text-white px-8 rounded-2xl font-bold shadow-md active:scale-95 transition">검색</button>
                    </div>
                    <div id="school-search-results" class="max-h-64 overflow-y-auto mt-6 space-y-2 rounded-xl"></div>
                </div>
            </section>
        </main>

        <nav id="bottom-nav" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md bg-white/90 backdrop-blur-xl border border-slate-200 flex justify-around py-4 rounded-[2.5rem] shadow-2xl z-50">
            <button onclick="switchView('calendar')" id="nav-calendar" class="flex flex-col items-center gap-1 tab-active flex-1"><span class="text-2xl">📅</span><span class="text-[11px] font-bold">달력</span></button>
            <button onclick="switchView('chart')" id="nav-chart" class="flex flex-col items-center gap-1 tab-inactive flex-1"><span class="text-2xl">📈</span><span class="text-[11px] font-bold">차트</span></button>
            <button onclick="switchView('analysis')" id="nav-analysis" class="flex flex-col items-center gap-1 tab-inactive flex-1"><span class="text-2xl">💡</span><span class="text-[11px] font-bold">분석</span></button>
        </nav>
    </div>

    <div id="overlay" class="overlay" onclick="closeModal()"></div>
    <div id="message-box" class="custom-modal">
        <div id="message-text" class="text-slate-700 font-bold mb-8 leading-relaxed text-left max-h-[350px] overflow-y-auto whitespace-pre-wrap text-sm"></div>
        <button onclick="closeModal()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold shadow-lg transition active:scale-95">확인</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzzy5rTRkMCM_yGobsETJqY8oH3GQsAgs6IQQgomm0-vLe6AbaeIMOWBklm65B0TUwa/exec";
        let currentMonth = new Date(), records = {}, schoolInfo = null, selectedDateStr = null, isSyncing = false, chartInstance = null, currentChartType = 'sugar';

        window.onload = async () => { 
            loadLocalData(); 
            renderCalendar(); 
            displayCurrentSchool();
            await syncWithCloud(); 
        };

        function loadLocalData() {
            try {
                records = JSON.parse(localStorage.getItem('health_records_v6')) || {};
                schoolInfo = JSON.parse(localStorage.getItem('health_school_v6'));
            } catch(e) { records = {}; }
        }

        async function syncWithCloud() {
            if (isSyncing) return; isSyncing = true;
            document.getElementById('sync-status').classList.remove('hidden');
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                if (data.records) { records = data.records; localStorage.setItem('health_records_v6', JSON.stringify(records)); renderCalendar(); }
                if (data.schoolInfo) { schoolInfo = data.schoolInfo; localStorage.setItem('health_school_v6', JSON.stringify(schoolInfo)); displayCurrentSchool(); }
            } catch (e) { console.error(e); } finally { isSyncing = false; document.getElementById('sync-status').classList.add('hidden'); }
        }

        async function handleSave() {
            if (!selectedDateStr) return; const btn = document.getElementById('save-btn'); btn.disabled = true;
            const record = { 
                date: selectedDateStr, 
                m_val: document.getElementById('m_val').value, m_memo: document.getElementById('m_memo').value, 
                l_val: document.getElementById('l_val').value, l_memo: document.getElementById('l_memo').value, 
                d_val: document.getElementById('d_val').value, d_memo: document.getElementById('d_memo').value, 
                memo: document.getElementById('memo_val').value, weight: document.getElementById('weight_val').value 
            };
            records[selectedDateStr] = record; localStorage.setItem('health_records_v6', JSON.stringify(records));
            try { await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(record) }); setTimeout(async () => { await syncWithCloud(); switchView('calendar'); btn.disabled = false; }, 500); } catch (e) { btn.disabled = false; }
        }

        async function runAIAnalysis(mode) {
            const btnA = document.getElementById('analysis-btn'), btnB = document.getElementById('ask-btn'), loading = document.getElementById('analysis-loading'), container = document.getElementById('analysis-result-container'), content = document.getElementById('analysis-result-content'), qInput = document.getElementById('ai-question-input');
            if (Object.keys(records).length === 0) { showMessageBox("기록된 데이터가 없습니다."); return; }
            btnA.disabled = btnB.disabled = true; loading.classList.remove('hidden'); container.classList.add('hidden');
            const dataStr = Object.entries(records).sort((a,b)=>a[0].localeCompare(b[0])).map(([d,r])=>`${d}: 혈당${r.m_val}/${r.l_val}/${r.d_val}, 체중${r.weight}`).join('\n');
            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ type: "analyze", prompt: `데이터:\n${dataStr}\n요청:${mode==='question'?qInput.value:'전체 리포트'}` }) });
                const result = await res.json();
                if (result.error) throw new Error(result.error);
                content.innerHTML = result?.candidates?.[0]?.content?.parts?.[0]?.text.replace(/^### (.*$)/gim, '<h3>$1</h3>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
                loading.classList.add('hidden'); container.classList.remove('hidden');
            } catch (e) { showMessageBox(`[실패]\n${e.message}`); loading.classList.add('hidden'); } finally { btnA.disabled = btnB.disabled = false; }
        }

        function renderCalendar() {
            const body = document.getElementById('calendar-body'); body.innerHTML = '';
            const yr = currentMonth.getFullYear(), mo = currentMonth.getMonth();
            document.getElementById('view-title').innerText = `${yr}년 ${mo + 1}월`;
            const first = new Date(yr, mo, 1).getDay(), last = new Date(yr, mo + 1, 0).getDate();
            for (let i = 0; i < first; i++) body.appendChild(Object.assign(document.createElement('div'), {className:'day-cell bg-slate-50/50'}));
            for (let d = 1; d <= last; d++) {
                const dateKey = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const cell = Object.assign(document.createElement('div'), {className:'day-cell'});
                const r = records[dateKey];
                let cellContent = `<div><span class="text-xs font-bold">${d}</span></div>`;
                if (r) {
                    const check = (v, t) => parseInt(v) <= t ? 'text-sky-500' : 'text-rose-500';
                    cellContent += '<div class="text-[9px] md:text-[10px] font-bold mt-1 flex flex-col flex-grow">';
                    cellContent += `<div class="h-4">${r.m_val ? `🌥️ <span class="${check(r.m_val, 100)}">${r.m_val}</span>` : ''}</div>`;
                    cellContent += `<div class="h-4">${r.l_val ? `☀️ <span class="${check(r.l_val, 180)}">${r.l_val}</span>` : ''}</div>`;
                    cellContent += `<div class="h-4">${r.d_val ? `🌙 <span class="${check(r.d_val, 180)}">${r.d_val}</span>` : ''}</div>`;
                    const weightStr = r.weight ? String(r.weight).trim() : "";
                    if (weightStr !== "") cellContent += `<div class="mt-auto border-t pt-0.5 text-slate-400 font-normal">⚖️ ${weightStr}</div>`;
                    else cellContent += `<div class="mt-auto"></div>`;
                    cellContent += '</div>';
                }
                cell.innerHTML = cellContent;
                cell.onclick = () => { 
                    selectedDateStr = dateKey; 
                    const rec = records[dateKey]||{}; 
                    const days = ['일', '월', '화', '수', '목', '금', '토'];
                    const dObj = new Date(dateKey.replace(/-/g, '/'));
                    const dayName = days[dObj.getDay()];
                    document.getElementById('input-date-title').innerText = `${dateKey}(${dayName})`; 
                    ['m_val','m_memo','l_val','l_memo','d_val','d_memo','weight_val','memo_val'].forEach(id => {
                        const el = document.getElementById(id);
                        if (el) el.value = rec[id === 'memo_val' ? 'memo' : (id === 'weight_val' ? 'weight' : id)] || '';
                    });
                    switchView('input'); 
                };
                body.appendChild(cell);
            }
        }

        function switchView(n) {
            document.querySelectorAll('.view-section').forEach(s=>s.classList.add('hidden'));
            document.getElementById(`view-${n}`).classList.remove('hidden');
            const header = document.getElementById('main-header');
            if (n === 'input') header.style.display = 'none';
            else header.style.display = 'block';
            document.querySelectorAll('#bottom-nav button').forEach(b => {
                if (b.id === `nav-${n}`) { b.classList.add('tab-active'); b.classList.remove('tab-inactive'); }
                else { b.classList.remove('tab-active'); b.classList.add('tab-inactive'); }
            });
            if(n==='calendar') renderCalendar(); else if(n==='chart') setTimeout(updateChart, 50);
            window.scrollTo(0,0);
        }

        function validateInputColor(el, t) { if (!el) return; const val = parseInt(el.value); el.style.color = !el.value ? '' : (val <= t ? '#0ea5e9' : '#f43f5e'); }
        function changeMonth(s) { currentMonth.setMonth(currentMonth.getMonth() + s); renderCalendar(); }
        function showMessageBox(t) { document.getElementById('message-text').innerText = t; document.getElementById('overlay').style.display = 'block'; document.getElementById('message-box').style.display = 'block'; }
        function closeModal() { document.getElementById('overlay').style.display = 'none'; document.getElementById('message-box').style.display = 'none'; }
        
        async function searchSchool() {
            const q = document.getElementById('school-search-input').value; if(!q) return;
            const resultsDiv = document.getElementById('school-search-results');
            resultsDiv.innerHTML = '<div class="text-center py-4 text-slate-400 animate-pulse">학교 검색 중...</div>';
            try {
                const res = await fetch(`https://open.neis.go.kr/hub/schoolInfo?Type=json&SCHUL_NM=${encodeURIComponent(q)}`);
                const data = await res.json();
                if(data.schoolInfo) {
                    resultsDiv.innerHTML = data.schoolInfo[1].row.map(s => `<div onclick="selectSchool('${s.ATPT_OFCDC_SC_CODE}','${s.SD_SCHUL_CODE}','${s.SCHUL_NM}')" class="p-4 border border-slate-100 bg-white hover:bg-sky-50 cursor-pointer text-sm font-bold transition rounded-2xl shadow-sm">${s.SCHUL_NM} <span class="text-[10px] text-slate-400 font-normal ml-2">${s.ORG_RDNMA}</span></div>`).join('');
                } else resultsDiv.innerHTML = '<div class="text-center py-4 text-slate-400 italic">검색 결과가 없습니다.</div>';
            } catch(e) { showMessageBox("학교 검색 실패: " + e.message); }
        }

        async function selectSchool(atpt, schul, name) {
            schoolInfo = { ATPT_OFCDC_SC_CODE: atpt, SD_SCHUL_CODE: schul, SCHUL_NM: name };
            localStorage.setItem('health_school_v6', JSON.stringify(schoolInfo));
            displayCurrentSchool();
            document.getElementById('school-search-results').innerHTML = '';
            try { await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ type: "settings", schoolInfo }) }); } catch(e) {}
            showMessageBox(`${name}이(가) 성공적으로 설정되었습니다.`);
        }

        function displayCurrentSchool() { document.getElementById('school-name-display').innerText = schoolInfo ? `✅ 현재 설정: ${schoolInfo.SCHUL_NM}` : "❌ 학교 미설정"; }

        async function fetchMealData() {
            if(!schoolInfo || !selectedDateStr) { showMessageBox("학교를 먼저 설정해주세요."); switchView('settings'); return; }
            try {
                const res = await fetch(`https://open.neis.go.kr/hub/mealServiceDietInfo?Type=json&ATPT_OFCDC_SC_CODE=${schoolInfo.ATPT_OFCDC_SC_CODE}&SD_SCHUL_CODE=${schoolInfo.SD_SCHUL_CODE}&MLSV_YMD=${selectedDateStr.replace(/-/g,'')}`);
                const data = await res.json();
                if(data.mealServiceDietInfo) {
                    const row = data.mealServiceDietInfo[1].row.find(r => r.MMEAL_SC_NM.includes('중식'));
                    if(row) document.getElementById('l_memo').value = row.DDISH_NM.replace(/<br\/>/g, '\n').replace(/\([^)]*\)/g, '').replace(/[\*\.]/g, '').trim();
                    else showMessageBox("해당 날짜의 급식 정보가 없습니다.");
                } else showMessageBox("정보를 찾을 수 없습니다.");
            } catch(e) { showMessageBox("급식 정보 조회 실패"); }
        }

        function updateChart() {
            const canvas = document.getElementById('mainChart'); if(!canvas) return;
            const ctx = canvas.getContext('2d'); const yr = currentMonth.getFullYear(), mo = currentMonth.getMonth();
            const last = new Date(yr, mo+1, 0).getDate(); const labels = Array.from({length:last}, (_,i)=>i+1);
            const getVal = (day, key) => { const dateKey = `${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`; const val = records[dateKey]?.[key]; return (val && val !== "") ? parseFloat(val) : null; };
            let datasets = [];
            let options = { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top', align: 'end', labels: { boxWidth: 12, font: { size: 11, weight: 'bold' } } } }, scales: { y: { grid: { lineWidth: (context) => (context.tick.value === 100 || context.tick.value === 180) ? 2 : 1, color: (context) => (context.tick.value === 100 || context.tick.value === 180) ? 'rgba(0, 0, 0, 0.4)' : 'rgba(0, 0, 0, 0.05)' } } }, spanGaps: true };
            if (currentChartType === 'sugar') {
                datasets = [{ label: '아침', data: labels.map(d => getVal(d, 'm_val')), borderColor: '#7dd3fc', backgroundColor: '#7dd3fc', tension: 0.3, fill: false }, { label: '점심', data: labels.map(d => getVal(d, 'l_val')), borderColor: '#fb923c', backgroundColor: '#fb923c', tension: 0.3, fill: false }, { label: '저녁', data: labels.map(d => getVal(d, 'd_val')), borderColor: '#1e3a8a', backgroundColor: '#1e3a8a', tension: 0.3, fill: false }];
                options.scales.y.min = 70; options.scales.y.max = 250; options.scales.y.ticks = { stepSize: 10 };
            } else {
                datasets = [{ label: '체중(kg)', data: labels.map(d => getVal(d, 'weight')), borderColor: '#0ea5e9', fill: false, tension: 0.3 }];
                options.scales.y.min = 45; options.scales.y.max = 65;
            }
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, { type: 'line', data: { labels, datasets }, options: options });
        }

        function setChartType(t) { 
            currentChartType = t; 
            const btns = document.querySelectorAll('button[onclick*="ChartType"]');
            if (btns.length >= 2) {
                if (t === 'sugar') { btns[0].className = "px-8 py-3 rounded-2xl bg-sky-500 text-white font-bold transition"; btns[1].className = "px-8 py-3 rounded-2xl bg-slate-100 text-slate-500 font-bold transition"; }
                else { btns[0].className = "px-8 py-3 rounded-2xl bg-slate-100 text-slate-500 font-bold transition"; btns[1].className = "px-8 py-3 rounded-2xl bg-sky-500 text-white font-bold transition"; }
            }
            updateChart(); 
        }
    </script>
</body>
</html>
